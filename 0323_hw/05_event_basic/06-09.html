<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .btnColor {
        background-color: aqua;
        color: black;
      }
      .btnAlign {
        text-align: center;
        width: 120px;
      }
      .btnBorder {
        border: khaki dashed 1px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <input
        type="checkbox"
        v-model="btnStyle.btnColor"
        value="true"
      />색상<br />
      <input
        type="checkbox"
        v-model="btnStyle.btnAlign"
        value="true"
      />정렬,크기<br />
      <input
        type="checkbox"
        v-model="btnStyle.btnBorder"
        value="true"
      />테두리선<br />
      <button :class="btnStyle">버튼1</button>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script type="text/javascript">
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            btnStyle: { btnColor: false, btnAlign: false, btnBorder: false },
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
